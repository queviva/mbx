<!doctype html>
<html lang="en">
  <head>
    <title>mbx4.0 beta</title>
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <!-- <link rel="stylesheet" href="mbx3.css" /> -->
    <script
      src="mbx4.js"
      data-mbx='{"tag":"rat-batix","css":"mbx4.css"}'
    ></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding-top: 30vh;
        padding-bottom: 100vh;
        background-color: #111;
      }
      rat-batix {
        width: 100%;
        font-size: 1.25rem;
        background-color: #111;
      }
      @media screen and (orientation: portrait) {
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"xxx_color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <x id="T5">5 +</x>
          <mbx-frak id="frak-1">
            <x id="Tx">x</x>
            <x>2</x>
          </mbx-frak>
          <x id="EQ">=</x>
          <mbx-frak id="frak-2">
            <x><x id="T3">3</x></x>
            <x><x id="T4">4</x></x>
          </mbx-frak>
          <x id="T9">+ 9</x>
        `,
        steps: [
          {
            note: `
              <x>short and sweet tags</x>
            `,
            acts: (X) => {
            },
          },
          {
            note: "move is extremely destructive",
            acts: (X) => {
              X.spot("T9").viva();
              X.spot("Tx")
                .moveAfter("frak-2")
                .during(0.0, 0.3)
              ;
              X.spot("T5").spin().vault().moveAfter("T9");
            }
          },
          {
            acts: (X) => {
            }
          },
        ],
      };

      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
</html>
