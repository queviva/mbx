<!doctype html>
<html lang="en">
  <head>
    <title>mbx4.0 beta</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="mbx3.css" /> -->
    <script src="mbx4.js" data-mbx='{"tag":"rat-batix","css":"mbx4.css"}'></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding-top: 30vh;
        padding-bottom: 100vh;
        background-color: #111;
      }
      rat-batix {
        width: 100%;
        font-size: 1.25rem;
        background-color: #111;
      }
      @media screen and (orientation: portrait) {
        rat-batix {
          font-size: 0.8em;
        }
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"xxx_color":300}'></rat-batix>
    <rat-batix id="one" data-mbx='{"color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <x data-logo>MATHROBATIX</x>
          illuminated acrobatic gestural mathematics
        `,
        steps: [
          {
            load: `
            <mbx-frak id="frak-1">
             <x>
              <x id="tan-5">5</x>
             </x>
             <x>
              <mbx-sin base="2" id="sin-3">3</mbx-sin>
             </x>
            </mbx-frak>
            +
            <mbx-frak id="frak-2">
             <x>
              <x id="T5x">5x</x>
             </x>
             <x id="T2">2</x>
            </mbx-frak>
            `,
            note: "funk funks",
            acts: (X) => {
              X.spot("tan-5").tan("-1");
              X.spot("frak-2").foink("0.75em");
              X.spot("T5x").colorize("green");
              // X.spot("sin-3").spin();
              // X.spot("frak-2").ln();
              // X.spot("frak-2-ln").spin();
            }
          },
          {},
          { // default distribution
            load: `
            <x id="T3">3</x>
            <x data-tite-left>(</x>
            <x id="Tx">x</x> + <x id="T1">1</x>
            <x data-tite-rite>)</x>
            = 5
            `,
            acts: (X) => {
              X.spot("Tx", "T1").dist("T3");
              X.spot("T3-doppel-0").blink().during(0.3, 1);
              X.spot("T3-doppel-1").blink().during(0.3, 1);
              X.spot("T3").vaporize();
            }
          },
          {note: "retains options"},
          { // blur move
            load: `
            <x id="T3yx">
             <x data-tite>
              <x>3</x>
              <x data-doppel>
               <x id="Ty-a">y</x>
               <x id="Ty-b">y</x>
               <x id="Ty-c">y</x>
              </x>
              <x>x</x>
             </x>
            </x>
            <x> + 9 = </x>
            <x id="T3catch-y-k">
             <x data-tite>
              <x>3</x>
              <x data-catch>
               <x id="catch-1"></x>
              </x>
              <x>k</x>
             </x>
            </x>
            `,
            note: "why why why",
            acts: (X) => {
              X.spotAll().blur();
              X.spot("Ty-a").blink().bulk(2.2).moveAfter("catch-1").during(0,  0.8);
              X.spot("Ty-b").blink().bulk(2.2).moveAfter("catch-1").during(0.1, 0.9);
              X.spot("Ty-c").blink().bulk(2.2).moveAfter("catch-1").during(0.2, 1.0);
            }
          }
        ],
      };
      const MMMroutineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <x style="z-index:10;">
          <mbx-frak id="frak-1">
            <x id="T5">5</x><x>x<x id="pow2" data-sup>2</x></x>
          </mbx-frak>
          </x>
          <x id="EQ">=</x>
          <mbx-frak id="frak-2">
            <x>3</x><x id="T2">2</x>
          </mbx-frak>
        `,
        steps: [
          {
            note: "yes, you can do this",
            acts: (X) => {
              // X.spot("T5").spin("-720deg");
              X.spot("frak-1").bulk("2").blink().ciprokate();
              X.spot("frak-2").bulk("0.75").blink().ciprokate(-1);
            },
          },
          {
            note: "un frak that",
            acts: (X) => {
              X.mount("Tdot", "&middot;").insertAfter("T2").grow();
              X.spot("frak-1").unFrak();
              X.spot("T5").moveAfter("Tdot");
            },
          },
          {
            note: "perfection",
            acts: (X) => {
              X.mount("T10", "10");
              X.spot("T2", "Tdot", "T5").team("team-1").spin().xfade("T10");
              X.spot("pow2").vaporize().shrink();
              X.spot("frak-2").root();
            },
          },
          {
            note: "plus or minus",
            acts: (X) => {
              X.mount("Tporm", "&#177;").insertAfter("EQ").grow();
              X.mount("good", "").good();
            },
          },
        ],
      };
      const KKKroutineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
            <x id="P1" data-parens-left>(</x>
             <x id="T3x">3x</x>
             <x id="T3x-fax">
              <x id="T3-m">3</x>
              <x id="Tx-m">x</x>
             </x>
             -
             <x id="T27">27</x>
             <x id="T27-fax">
              <x id="T3-a">3</x>
              <x id="T3-b">3</x>
              <x id="T3-c">3</x>
             </x>
            <x id="P2" data-parens-rite>)</x>
            =
            <x id="T5">5</x>
        `,
        steps: [
          {
            note: `
            <x>twenty-seven is three ...</x>
            <x>times three times three</x>
            `,
            acts: (X) => {
              X.spot("T3x").faxx("T3x-fax");
              X.spot("T27").faxx("T27-fax");
            },
          },
          {
            acts: (X) => {
              X.mount("catch", "<x data-catch><x id='catch-3'>3</x>").insertAfter("P2").grow();
              X.spot("T3-m").spin().vault("1.4em").moveAfter("catch-3");
              X.spot("T3-b").spin().vault().moveAfter("catch-3");
              X.mount("T9", "9");
              X.spot("T27").xfade("T9");
              X.mount("Tx", "x");
              X.spot("T3x").xfade("Tx");
            },
            note: `
              faktor a three from each term
            `,
          },
          {
            note: `
            <x>only x remains from 3x</x>
            <x>three times three is nine</x>
            `,
            acts: (X) => {
              X.spot("T3x-faxx").unFaxx();
              X.spot("T27-faxx").unFaxx();
            },
          },
          {
            load: `
            (x - 9)
            <x id="T3">3</x>
            =
            <x id="T5">5</x>
            <x id="catch-3" data-catch>
             <x id="C3">3</x>
            </x>
            `,
            note: "this is incredible",
            acts: (X) => {
              X.spot("T5").frak("catch-3");
              X.spot("T3").moveAfter("C3");
            },
          },
          {
            load: `
            <x id="P1"><x data-parens-left>(</x></x>
            x - 9
            <x id="P2"><x data-parens-rite>)</x></x>
            = <mbx-frak><x>5</x><x>3</x></mbx-frak>
            `,
            note: "drop the parenthesises",
            acts: (X) => {
              X.spot("P1", "P2").vaporize().during(0, 0.8).shrink().during(0.5, 1);
            },
          },
          {
            load: `
            x
            <x id="Tminus9">
             <x id="Tminus">-</x>
             <x id="Tplus">+</x>
             9
            </x>
            =
            <mbx-frak id="frak-1">
             <x>5</x><x>3</x>
            </mbx-frak>
            `,
            note: `
              <x>flip the sign, flop the side</x>
            `,
            acts: (X) => {
              X.spot("Tminus").xfade("Tplus").viva();
              X.spot("Tminus9").spin().vault().moveAfter("frak-1");
            },
          },
          {
            note: "you're so good!!!",
            acts: (X) => {
              X.mount("good", "");
              X.spot("good").good();
            },
          },
        ],
      };
      const ZZZroutineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        steps: [
          {
            load: `
            <x>x</x>
            <x data-sup>
             <x id="pow-half">
              (1 /// 2)
             </x>
             <x data-sup>
              <x id="pow2-a">2</x>
             </x>
            </x>
            <x id="EQ">=</x>
            <x id="T3">3</x>
            <x id="pow2-b" data-sup>2</x>
            `,
            note: "funk of all evil",
            acts: (X) => {
              X.spot("frak-1").inlineFrak();
              X.spot("pow2-a", "pow2-b").grow();
            },
          },
          {
            acts: (X) => {
              X.spot("pow2-a").moveBefore("pow-half");
            },
          },
          {
            load: `
            x
            <x data-sup>
             <x id="g-1">2(1 /// 2)</x>
             <x id="g-2">1</x>
            </x>
            = 3^2
            `,
            acts: (X) => {
              X.spot("g-1").spin("720deg").xfade("g-2");
            },
          },
          {
            load: `
            x<x id="pow1" data-sup>1</x>
            <x id="g-1">= 3^2</x>
            <x id="EQ">=</x>
            <x id="T9">9</x>
            `,
            acts: (X) => {
              X.spot("pow1").vaporize().shrink().during(0.75);
              X.spot("g-1").shrink().during(0.5);
              X.spot("EQ", "T9").unfurl(0, 0.5);
            },
          },
          {
            load: `
            <x>x = 9</x><x id="good"></x>
            `,
            note: "looks good",
            acts: (X) => {
              X.spot("good").good();
            },
          },
        ],
      };
      const XXXroutineTwo = {
        intro: `
          <x data-logo>MATHROBATIX</x>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <x id="P1" data-parens-left>(</x>
          <x id="Tx2">
           <x id="Tx-a">x</x>
           <x id="pow-area" data-sup>
            <x data-doppel>
             <x id="Pow2">2</x>
            </x>
           </x>
          </x>
          +
          <x id="T4x" data-tite>
           <x id="T4">4</x>
           <x id="Tx-b">x</x>
          </x>
          <x id="P2" data-parens-rite style="margin-right:-0.125em;">)</x>
          <x data-sup>
            <x id="Pow-paren"></x>
          </x>
          <x id="EQ">=</x>
          <x id="T5">5</x>
          <x id="Tplus">+ <x id="something">!?!</x></x>
          <mbx-half id="T-half"></mbx-half>
        `,
        steps: [
          {
            note: `
            <x>move the square outside</x>
            <x>turn the x into a one-half</x>
            <x>and add <i>something</i> ?!?</x>
            `,
            acts: (X) => {
              X.spot("Tplus").grow();
              X.spot("something").viva();
              X.spot("Tx-b").xfade("T-half").during(0.5, 1.0);
              X.spot("Pow2").spin().vault("0.5em").moveAfter("Pow-paren").during(0, 1);
            },
          },
          {
            load: `
            <x id="P1"><x data-parens-left>(</x></x>
            x +
            <x id="T-all">
             <x data-tite>4<mbx-half></mbx-half></x>
             <x data-parens-rite>)</x>^2
            </x>
            = 5 <x id="T-plus">+</x>
             <x id="T-exclaim">!?!</x>
            
            `,
            note: `
            <x>but what do we add?!? ...</x>
            <x style="font-weight:bold;">the exact same thing</x>
            `,
            acts: (X) => {
              X.spot("T-all").flash().during(0, 0.4);
              X.spot("T-exclaim").shrink().during(0.4, 1);
              // X.spot("T-exclaim").vaporize().during(0.3, 1).shrink().during(0.3, 1);
              X.spot("P1", "T-all").doppel();
              X.spot("P1-doppel-0", "T-all-doppel-0")
                .vault()
                .during(0.3, 1)
                .moveAfter("T-exclaim")
                .during(0.3, 1);
            },
          },
          {
            load: `
            (x + 
            <x id="T4-half-a" data-tite>
             4<mbx-half id="T-half-a"></mbx-half>
            </x>
            <x data-parens-rite>)</x>^2
            = 5 +
            <x id="pow-spin">
            <x>
            <x data-parens-left>(</x>
            <x id="T4-half" data-tite>
             4<mbx-half id="T-half"></mbx-half>
            </x>
            <x data-parens-rite>)</x>^2
            </x>
            </x>

            <x id="T2">2</x>
            <x id="T2-a">2</x>
            <x id="T4">4</x>
            `,
            note: `
            <x>half of four is two</x>
            <x>and two-squared is four</x>
            `,
            acts: (X) => {
              X.spot("T4-half-a").xfade("T2-a").during(0, 0.5).spin("-360deg").during(0, 0.5);
              X.spot("T4-half").xfade("T2").during(0, 0.5).spin("-360deg").during(0, 0.5);
              X.spot("pow-spin").xfade("T4").during(0.5).spin("360deg").during(0.5);
            },
          },
          {
            load: `
            (x + 2)^2 = <x id="T5-T4">5 + 4</x>
            `,
            note: "I don't know what five plus four is",
            acts: (X) => {
              X.spot("T5-T4").brak();
            },
          },
          {
            load: `
            <x id="P1">
              <x data-parens-left>(</x>
            </x>
            <x>x + 2</x>
            <x id="P2">
             <x data-parens-rite>)</x>^2
            </x>
            <x id="EQ">=</x>
            <x>
             <mbx-brak id="T5-T4">
              <x>
              <x id="T54">
                5 + 4
              </x>
              <x id="T9">9</x>
              </x>
             </mbx-brak>
            </x>
            `,
            note: `
             that turned out to be nine
            `,
            acts: (X) => {
              X.spot("T9").spin("720deg");
              X.spot("T5-T4").unBrak().during(0, 0.5);
              X.spot("T54").absorb("T9");
            },
          },
          {
            note: `
            square root both sides
            `,
            acts: (X) => {
              X.spot("P1", "P2").shrink().during(0.5, 1);
              X.spot("P1", "P2").vaporize().during(0, 0.7);
              X.spot("T9").root();
            },
          },
          {
            acts: (X) => {
              X.spot("P1", "P2").dismount();
              X.mount("Tpm", "&#177;").insertAfter("EQ").grow();
              X.mount("T3", "3");
              X.spot("T9").xfade("T3");
              X.spot("T9-root").unRoot();
            },
          },
          {
            load: `
            x 
            <x id="Tplus2">
             <x id="Tplus">+</x>
             <x id="T2">2</x>
            </x>
            <x id="EQ">=</x>
            &#177; 3
            `,
            acts: (X) => {
              X.mount("Tminus", "-").viva();
              X.spot("Tplus").xfade("Tminus");
              X.spot("Tplus2").spin().vault().moveAfter("EQ");
            },
          },
          {
            load: `
            x = <x id="B1" data-parens-left>{</x>
            - 2
            <x id="Tplusminus">&#177;</x>
            <x id="Tplus-a">+</x>
            <x id="T3-a">3</x>
            <x id="comma" data-parens-rite>,</x>
            <x id="Tminus-b">-</x>
            <x id="T2-b">2</x>
            <x id="Tminus-c">-</x>
            <x id="T3-b">3</x>
            <x id="B2" data-parens-rite>}</x>

            `,
            acts: (X) => {
              X.spot("comma", "Tminus-b", "T2-b", "Tminus-c", "T3-b", "B2").unfurl();
              X.spot("B1").grow();
              X.spot("Tplusminus").blink().during(0, 0.4);
              X.spot("Tplusminus").xfade("Tplus-a");
            },
          },
          {
            load: `
            x = <x data-parens-left>{</x>
             <x id="T23-a">- 2 + 3</x>
             <x id="T1">1</x>
             <x data-parens-rite>,</x>
             <x id="T23-b">- 2 - 3</x>
             <x id="T-5">-5</x>
            <x data-parens-rite>}</x>
            `,
            acts: (X) => {
              X.spot("T23-a").absorb("T1");
              X.spot("T23-b").absorb("T-5");
            },
          },
        ],
      };

    </script>
    <script id="LOADER">
      const one = document.getElementById("one");
      one.addEventListener("mbx-ready", (e) => {
        // one.loadRoutine(XXXroutineTwo);
      });
      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
</html>
