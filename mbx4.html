<!doctype html>
<html lang="en">
  <head>
    <title>mbx4.0 beta</title>
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <!-- <link rel="stylesheet" href="mbx3.css" /> -->
    <script
      src="mbx4.js"
      data-mbx='{"tag":"rat-batix","css":"mbx4.css"}'
    ></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding-top: 30vh;
        padding-bottom: 100vh;
        background-color: #111;
      }
      rat-batix {
        width: 100%;
        font-size: 1.25rem;
        background-color: #111;
      }
      @media screen and (orientation: portrait) {
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"xxx_color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <x id="Tdoppel" data-doppel>
            <x id="T5-a">5</x>
            <x id="T5-b">5</x>
            <x id="T5-c">5</x>
            <x id="T5-1">5</x>
            <x id="T5-0">5</x>
          </x>
          <mbx-frak id="frak-1">
            <x>
            <x id="T2x" xxx-data-tite>
              <x id="Tx3">
                <x id="Tx">x</x>
                <x data-sup>
                  <x id="Ty">y</x>
                </x>
              </x>
            </x>
            </x>
            <x>
              <x id="T2-b">2</x>
            </x>
          </mbx-frak>
          <x id="EQ">=</x>
          <mbx-frak id="frak-2">
            <x data-doppel><x id="T3">3</x></x>
            <x><x id="T4">4</x></x>
          </mbx-frak>
        `,
        steps: [
          {
            note: `
              <x>short and sweet tags</x>
            `,
            acts: (X) => {
            },
          },
          {
            note: "move is extremely destructive",
            acts: (X) => {
              X.spot("T5-0").ghost().during(0, 0.3).shrink().during(0.5);
              X.spot("T5-1").vaporize().during(0.3, 0.5);
              X.mount("T3-z", "3");
              X.spot("T5-a").xfade("T3-z").spin().vault("1.2em").during(0.5, 1).moveBefore("T3").during(0.5, 1);
              X.spot("T5-b").moveBefore("Ty").during(0.5, 1);
              X.spot("T5-c").moveBefore("frak-2").during(0.5, 1);
            }
          },
          {
            acts: (X) => {
              X.spot("Tdoppel").dismount();
            }
          },
        ],
      };

      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
</html>
