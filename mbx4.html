<!doctype html>
<html lang="en">
  <head>
    <title>mbx4.0 beta</title>
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <!-- <link rel="stylesheet" href="mbx3.css" /> -->
    <script
      src="mbx4.js"
      data-mbx='{"tag":"rat-batix","xxx_css":"mbx4.css"}'
    ></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding-top: 30vh;
        padding-bottom: 100vh;
        background-color: #111;
      }
      rat-batix {
        width: 100%;
        font-size: 1.25rem;
        background-color: #111;
      }
      @media screen and (orientation: portrait) {
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"xxx_color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <mbx-frak id="frak-1">
           <x id="T2x2">2x^2</x>
           <x id="T2">2</x>
          </mbx-frak>
          <x id="EQ">=</x>
          <mbx-cank id="cank-9">
           <x id="T9">9</x>
          </mbx-cank>
        `,
        steps: [
          {
            note: `
              <x><br>short and sweet tags</x>
            `,
            acts: (X) => {
              X.spot("frak-1").unFrak();
              X.spot("cank-9").unCank();
            },
          },
          {
            acts: (X) => {
            }
          },
          {},
        ],
      };

      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
