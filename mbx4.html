<!doctype html>
<html lang="en">
  <head>
    <title>mbx4.0 beta</title>
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <!-- <link rel="stylesheet" href="mbx3.css" /> -->
    <script
      src="mbx4.js"
      data-mbx='{"tag":"rat-batix","css":"mbx4.css"}'
    ></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding-top: 30vh;
        padding-bottom: 100vh;
        background-color: #111;
      }
      rat-batix {
        width: 100%;
        font-size: 1.25rem;
        background-color: #111;
      }
      @media screen and (orientation: portrait) {
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"xxx_color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <x id="T5">5</x>
          <x id="T9">+ 9</x>
           <x id="T2-b">+ 2</x>
           +
           <x id="T2x2" data-tite>
            <x id="T2-a">2</x>
            <x id="Tx2">x<x id="pow2" data-sup>2</x></x>
           </x>
          </mbx-frak>
          <x id="EQ">=</x>
        `,
        steps: [
          {
            note: `
              <x>short and sweet tags</x>
            `,
            acts: (X) => {
              X.spot("T2-b")
                .spin()
                .vault()
                .moveBefore("T9")
              ;
              X.spot("EQ").spin().during(0.35);
            },
          },
          {
            note: "move is extremely destructive",
            acts: (X) => {
            }
          },
          {},
        ],
      };

      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
</html>
