<!doctype html>
<html lang="en">
  <head>
    <title>mbx4.0 beta</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="mbx3.css" /> -->
    <script src="mbx4.js" data-mbx='{"tag":"rat-batix","css":"mbx4.css"}'></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding-top: 30vh;
        padding-bottom: 100vh;
        background-color: #111;
      }
      rat-batix {
        width: 100%;
        font-size: 1.25rem;
        background-color: #111;
      }
      @media screen and (orientation: portrait) {
        rat-batix {
          /* font-size: 2.25em; */
        }
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"xxx_color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <x id="P1" data-parens-left>(</x>
            <x id="Tx">x</x> + <x id="T3">3</x>
          <x id="P2" data-parens-rite>)</x>
          <x id="T7">7</x>
          <x id="EQ">=</x>
          <x id="T9">9</x>
        `,
        steps: [
          {
            note: "move is extremely destructive",
            load: `
            <x id="T3">3</x>
            <x id="EQ">=</x>
            <x id="Ty">
             <x id="yy">y</x>
             <x data-sup data-vert="-0.25em">
              <mbx-frak id="frak-1">
                <x><x id="T9">9</x></x>
                <x><x id="Tk">k</x></x>
              </mbx-frak>
             </x>
            </x>
            `,
            acts: (X) => {
              X.spot("T3", "Ty").log("y");
            },
          },
          {
            acts: (X) => {
              X.spot("frak-1").moveBefore("Ty-log-open");
              X.spot("Ty-log-open", "Ty-log-close", "Ty").shrink();
            },
          },
          {
            acts: (X) => {
              X.spot("frak-1").spin("180deg");
              X.spot("T9", "Tk").spin("-180deg");
            }
          },
          {}
        ],
      };

      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
</html>
