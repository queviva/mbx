<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mathro&middot;batiX Scroll Vault 0.9beta</title>
    <script src="mathrobatix1.0.js" data-x='{"tag":"mathro-batix"}'></script>
    <link rel="stylesheet" href="mathrobatix.css" />
  </head>
  <body>
    <mathro-batix id="one">
      <svg>
        <defs>
          <filter id="maincolor">
            <feFlood flood-color="var(--main-color)" result="F0" />
            <feComposite in="F0" in2="SourceGraphic" operator="in" />
          </filter>

          <filter id="svgviva" x="-200%" y="-200%" height="900%" width="900%">
            <feGaussianBlur stdDeviation="0.3" result="B0" />
            <feFlood
              flood-color="hsl(var(--nose-h), var(--nose-s), 90%)"
              result="F0"
            />
            <feComposite in="F0" in2="B0" operator="in" result="Z0" />

            <feGaussianBlur stdDeviation="2" result="B1" />
            <feFlood
              flood-color="hsl(calc(var(--nose-h) + 12), var(--nose-s), 50%)"
              result="F1"
            />
            <feComposite in="F1" in2="B1" operator="in" result="Z1" />

            <feGaussianBlur stdDeviation="3" result="B2" />
            <feFlood
              flood-color="hsl(calc(var(--nose-h) - 20), calc(var(--nose-s) * 0.69), 45%)"
              result="F2"
            />
            <feComposite in="F2" in2="B2" operator="in" result="Z2" />

            <feGaussianBlur stdDeviation="4" result="B3" />
            <feFlood
              flood-color="hsl( calc(var(--nose-h) - 40), calc(var(--nose-s) * 1.1), 50%)"
              result="F3"
            />
            <feComposite in="F3" in2="B3" operator="in" result="Z3" />

            <feGaussianBlur stdDeviation="8" result="B4" />
            <feFlood
              flood-color="hsl( var(--nose-h), calc(var(--nose-s) * 1.1), 50%)"
              result="F4"
            />
            <feComposite in="F4" in2="B4" operator="in" result="Z4" />

            <feMerge>
              <feMergeNode in="Z4" />
              <feMergeNode in="Z3" />
              <feMergeNode in="Z2" />
              <feMergeNode in="Z1" />
              <feMergeNode in="Z0" />
            </feMerge>
          </filter>
        </defs>
      </svg>
    </mathro-batix>
    <script id="ROUTINE" type="module">
      const routine = {
        title: "Quadratic Mania",
        intro: "you must solve this equation for x",
        stage: `
          <b id="T3x2">3x^2</b>
          <b id="T7x2">- 7x^2</b>
          <b id="T2">+ 2</b>
          <b id="EQ">=</b>
          <b id="T10">10</b>
        `,
        steps: [
          {
            note: `notice the like terms
              <b>
                like terms refers to the variable and its
                exponent being the same - in this case,
                there is the same variable x with
                an exponent of g_2 on two different terms;
                you can combine them by adding the
                coefficients, three and seven
              </b>
            `,
            acts: (S) => {
              S.mount("P1", "(").insertBefore("T3x2");
              S.mount("P2", ")").insertAfter("T7x2");
              S.select("T3x2","T7x2").viva();
              S.select("T10").vaporize().shrink().spin("180deg").during(0, 0.3);
              S.select("T2").grow();
            },
          },
          {
            note: "absorb them",
            acts: (S) => {
              S.select("T3x2", "T7x2").absorb("T10x2", "10x^2").viva();
            },
            encore: (S) => {
              
            },
          },
          {
            note: "what about this?",
            acts: (S) => {
              S.select("P1", "P2").dismount();
              S.select("T10x2").vaporize().shrink().during(0.7);
              S.select("T2").filter("ghost").filterClear();
            },
          },
          {
            note: "does +2 have the ghost from before?",
            acts: (S) => {
              S.select("T10x2").dismount();
              S.select("T2").filter("");
            }
          }
        ],
      };
      const one = document.getElementById("one");
      one.addEventListener("mbx-ready", (e) => {
        one.loadRoutine(routine);
      });
      one.addEventListener("mbx-step-ready", (e) => {
        //console.log(e.target.id, "ready");
      });
    </script>
  </body>
</html>
