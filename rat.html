<!doctype html>
<html lang="en">
  <head>
    <title>rat testing</title>
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <!-- <link rel="stylesheet" href="rat.css" /> -->
    <script
      src="mbx3.js"
      data-mbx='{"tag":"rat-batix","css":"rat.css"}'
    ></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-top: 50vh;
        padding-bottom: 100vh;
      }
      rat-batix {
        min-width: 70%;
        font-size: 3rem;
        background-color: #111;
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <b id="T3x2">3x<b id="Tsup2" data-sup>2</b></b>
          <b id="Tplus1">+</b>
          <b id="T7x">7x</b>
          <b id="Tplus2">+</b>
          <b id="T1">1</b>
          <b id="EQ">=</b>
          <b id="T5">5</b>
        `,
        steps: [
          {
            note: "this is it you see?",
            acts: (S) => {
              S.mount("T3x", "3x")
                .mount("T2x", "+ 2x")
                .spot("T7x", "Tplus2", "T1")
                .absorb("T3x", "T2x")
                .spin()

            },
          },
          {
            note: "check the un-doing of these",
            acts: (S) => {},
          },
        ],
      };
      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
</html>
