<!doctype html>
<html lang="en">
  <head>
    <title>MathrobatiX</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="mbx4.js"></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding-top: 30vh;
        padding-bottom: 100vh;
        background-color: #111;
      }
      mathro-batix {
        width: 100%;
        font-size: 1.25rem;
        background-color: #111;
      }
      @media screen and (orientation: portrait) {
        mathro-batix {
          font-size: 0.8em;
        }
      }
    </style>
  </head>

  <body>
    <mathro-batix id="mbx1" data-mbx='{"xxx_color":300}'></mathro-batix>

    <script id="ROUTINES">
      const routine = {
        intro: `
          <x data-logo>MATHROBATIX</x>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <x id="Tx-a">x</x>
          <x id="pow2-a">
           <x data-sup>2</x>
          </x>
          <x id="plus-b">+</x>
          <x data-tite>
           <x id="T3-b">3</x>
           <x id="Tx-b">x</x>
          </x>
          <x id="Tplus-c">+</x>
          <x id="T5-c">5</x>
          <x id="EQ">=</x>
          <x id="T9-d">9</x>
        `,
        steps: [
          {
            note: "let's solve for x",
            acts: (X) => {
              X.spot("pow2-a", "plus-b", "T3-b", "Tx-b", "Tplus-c", "T5-c", "EQ", "T9-d").unfurl();
            },
          },
        ],
      };
    </script>
    <script id="LOADER">
      const mbx1 = document.getElementById("mbx1");
      mbx1.addEventListener("mbx-ready", (e) => {
        mbx1.loadRoutine(routine);
      });
    </script>
  </body>
</html>
