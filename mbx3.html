<!doctype html>
<html lang="en">
  <head>
    <title>mbx3.0 beta</title>
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <!-- <link rel="stylesheet" href="mbx3.css" /> -->
    <script
      src="mbx3.js"
      data-mbx='{"tag":"rat-batix","css":"mbx3.css"}'
    ></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding-top: 30vh;
        padding-bottom: 100vh;
        background-color: #111;
      }
      rat-batix {
        width: 100%;
        font-size: 1.25rem;
        background-color: #111;
      }
      @media screen and (orientation: portrait) {
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"xxx_color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <x id="G1" data-tite>
           <x id="T5">5</x>
           <x id="Tx2">x^2</x>
          </x>
          <x id="EQ">=</x>
          <x id="T45">45</x>
          <x id="T5-a">5</x>
          <x id="T5-b">5</x>
        `,
        steps: [
          {
            note: "short and sweet tags",
            acts: (X) => {
              X.spot("G1").frak("T5-a");
              X.spot("T45").frak("T5-b");
            },
          },
          {
            note: "after canking, this",
            acts: (X) => {
              X.mount("T9", "9").insertAfter("T45")
                .grow("50% 50%").during(0.6);
              X.spot("T5").cank(0,"-13deg").during(0, 0.3);
              X.spot("T5-a").cank(0,"-25deg").during(0.25, 0.55);
              X.spot("T45").cank(0,"-10deg").during(0.5, 0.8);
              X.spot("T5-b").cank(0,"-18deg").during(0.75);
            }
          }
        ],
      };

      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
</html>
