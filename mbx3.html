<!doctype html>
<html lang="en">
  <head>
    <title>mbx3.0 beta</title>
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <!-- <link rel="stylesheet" href="rat.css" /> -->
    <script
      src="mbx3.js"
      data-mbx='{"tag":"rat-batix","css":"mbx3.css"}'
    ></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-top: 50vh;
        padding-bottom: 100vh;
        background-color: #888;
      }
      rat-batix {
        min-width: 70%;
        font-size: 3rem;
        background-color: #111;
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"XXX_color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        xxx_stage: `
          <b id="T7x">7x +</b>
          <b id="T3x2">
            <b data-prx>
              3x
              <b data-sup>
                2
                <b data-grow>
                  <b data-viva>- 1</b>
                </b>
              </b>
            </b>
          </b>
          <b id="T+2">+</b>
          <b id="T1">1</b>
          <b id="EQ">=</b>
          <b id="T5">5</b>
        `,
        stage: `
          <b id="T7">7</b>
          <b data-parens-left>(</b>
          <b id="Tx">x</b>
           + 
           <b id="T1">1</b>
          <b data-parens-rite>)</b>
          = 
          <b id="T5">5</b>
        `,
        steps: [
          {
            note: "this is it you see?",
            acts: (S) => {
              S.spot("Tx", "T1").dist("T7");
              S.spot("T5").cank(2,"45deg");
            },
          },
          {
            note: "preservation of popin-all?",
            acts: (S) => { 
              // S.spot("T7x-frak").viva();
            }
          }

        ],
      };
      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
</html>
