<!doctype html>
<html lang="en">
  <head>
    <title>mbx3.0 beta</title>
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <!-- <link rel="stylesheet" href="mbx3.css" /> -->
    <script
      src="mbx3.js"
      data-mbx='{"tag":"rat-batix","css":"mbx3.css"}'
    ></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding-top: 30vh;
        padding-bottom: 100vh;
        background-color: #111;
      }
      rat-batix {
        width: 100%;
        font-size: 1.25rem;
        background-color: #111;
      }
      @media screen and (orientation: portrait) {
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"xxx_color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <x id="T5">5</x>
          <x id="Tx2">x<x id="Pow2" data-sup>2</x></x>
          <x id="EQ">=</x>
          <x id="T49">49</x>
        `,
        steps: [
          {
            note: "short and sweet tags",
            acts: (X) => {
              X.spot("T5", "Tx2").group("G1");
              X.spot("G1", "T49").root();
            },
          },
          {
            acts: (X) => {
              X.spot("T49-root-front", "T49-root-top").vaporize();
              X.mount("Tpm", "&plusmn;").insertBefore("T49").materialize().grow("50% 50%");
              X.mount("T7", "7");
              X.spot("T49").xfade("T7");
              X.mount("Tgap", "&nbsp;").insertAfter("Tx2-root").grow("50% 50%");
              X.spot("G1-root").tuck("0.25em");
              X.spot("Tx2").vault().moveBefore("G1-root");
              X.spot("Pow2").vaporize().shrink();
            },
          },
          {
            load: `
            x <mbx-root id="Root-5">5</mbx-root> = 
            &plusmn; <x id="T7">7</x>
            <mbx-root id="Root-5-a">5</mbx-root>
            <mbx-root id="Root-5-b">5</mbx-root>
            `,
            acts: (X) => {
              X.spot("Pow2").dismount();
              X.spot("Root-5").inlineFrak("Root-5-a");
              X.spot("T7").inlineFrak("Root-5-b");

            },
          },
          {
            note: "this can reduce to one",
            load: `
             x
             <x data-group id="G1">
              <mbx-root>5</mbx-root>
                ///
              <mbx-root>5</mbx-root>
             </x>
             = &plusmn; 7
             <x id="T1">1</x>
            `,
            acts: (X) => {
              X.spot("G1").absorb("T1").viva();
            }
          },
          {
            note: "one times eks is just eks",
            load: `
            <x id="Tx1">x 1</x> = &plusmn; 7
            <x id="Tx">x</x>
            `,
            acts: (X) => {
              X.spot("Tx").viva().during(0.5);
              X.spot("Tx1").xfade("Tx").spin();
            }
          }
        ],
      };

      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
</html>
