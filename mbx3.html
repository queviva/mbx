<!doctype html>
<html lang="en">
  <head>
    <title>mbx3.0 beta</title>
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <!-- <link rel="stylesheet" href="mbx3.css" /> -->
    <script
      src="mbx3.js"
      data-mbx='{"tag":"rat-batix","css":"mbx3.css"}'
    ></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding-top: 30vh;
        padding-bottom: 100vh;
        background-color: #111;
      }
      rat-batix {
        width: 100%;
        font-size: 1.25rem;
        background-color: #111;
      }
      @media screen and (orientation: portrait) {
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <mbx-frak id="frak-1">
            <x id="Tx2">x^2</x>
            <x id="T9">9</x>
          </mbx-frak>
          <x id="EQ">=</x>
          <x id="T25">25</x>
        `,
        steps: [
          {
            note: `
              <x><br>short and sweet tags</x>
              <x data-rant>
                this is a much more thorough description
                of many other things that should be
                considered about this manipulation of
                the equation
              </x>
            `,
            acts: (X) => {
              X.spot("frak-1").root("Root-1");
              X.spot("T25").root();
            },
          },
          {
            acts: (X) => {
              X.spot("Root-1-rootlines").vaporize();
            }
          },
          {
          }
        ],
      };

      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
</html>
