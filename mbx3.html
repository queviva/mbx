<!doctype html>
<html lang="en">
  <head>
    <title>mbx3.0 beta</title>
    <meta charset="UTF-8" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0" /> -->
    <!-- <link rel="stylesheet" href="mbx3.css" /> -->
    <script
      src="mbx3.js"
      data-mbx='{"tag":"rat-batix","css":"mbx3.css"}'
    ></script>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding-top: 30vh;
        padding-bottom: 100vh;
        background-color: #111;
      }
      rat-batix {
        width: 100%;
        font-size: 1.25rem;
        background-color: #111;
      }
      @media screen and (orientation: portrait) {
      }
    </style>
  </head>

  <body>
    <rat-batix id="two" data-mbx='{"xxx_color":300}'></rat-batix>

    <script id="ROUTINES">
      const routineTwo = {
        intro: `
          <b data-logo>MATHROBATIX</b>
          illuminated acrobatic gestural mathematics
        `,
        stage: `
          <x id="Tx2">5x^2</x>
          <x id="EQ">=</x>
          <x id="T49">49</x>
          <mbx-cank id="cank99">99</mbx-cank>
        `,
        steps: [
          {
            note: "short and sweet tags",
            acts: (X) => {
              X.spot("T49").cank(0,"0deg");
            },
          },
          {
            note: "after canking, this",
            acts: (X) => {
              X.spot("cank99").vaporize().shrink();
            }
          }
        ],
      };

      const two = document.getElementById("two");
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
    </script>

    <script id="DEBUGG">
      const log = console.log;
    </script>
  </body>
</html>
