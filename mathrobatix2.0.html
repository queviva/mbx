<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mathrobatix 2.0B</title>
    <script src="mathrobatix2.0.js" data-x='{"tag":"mathro-batix"}'></script>
    <style id="demoStyles">
      @font-face {
        font-family: "Luckiest Guy";
        src: url(luckiest.ttf);
      }
      body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-bottom: 100vh;
        background-color: #888;
        --demo-h: 40;
      }
      mathro-batix {
        position: relative;
        display: inline;
        min-width: 70%;
      }
      [data-logo] {
        width: 70%;
        padding-top: 5vh;
        font-family: "Luckiest Guy";
        font-size: 50px;
        font-style: normal;
        line-height: 50px;
        text-align: center;
        color: hsl(40, 100%, 85%);
        -webkit-text-stroke: 2px hsl(var(--demo-h), 80%, 60%);
        background-color: #111;
      }
    </style>
  </head>
  <body>
    <div data-logo>MATHROBATIX</div>
    <mathro-batix id="one" data-mbx='{"color":"40"}'></mathro-batix>
    <div style="margin: 30px; font-size: 30px">and some stuff</div>
    <mathro-batix id="two" data-mbx='{"color":"300"}'></mathro-batix>
    <script id="ROUTINE">
      const XXX_routineOne = {
        intro: `distribute THIS, buddy`,
        stage: `
        <b id="T5x">5x</b> + <b id="T3">3</b>(<b id="Tx">x</b> + <b id="T1">1</b>) = <b id="T7">7</b>
        `,
        steps: [
          {
            note: "first step of distrobution test",
            acts: (S) => {
              S.mount("DOT", "&middot").insertAfter("T3").grow().viva();
            },
          },
          {
            note: "this is the distrobution",
            acts: (S) => {
              S.spot("T5x").cirk("2");
              S.spot("DOT").dismount();
              S.spot("T3").alter("3 &middot;");
              S.spot("Tx", "T1").dist("T3");
            },
          },
          {
            note: "what remains with IDs?",
            acts: (S) => {
              S.spot("T3-Tx").filter("viva").filterClear().spin();
              S.spot("T3-T1").filter("viva").filterClear().spin();
            },
          },
          {
            note: "actually DO the multiplications",
            acts: (S) => {
              S.spot("T3-Tx", "T3-T1").filter("");
              S.mount("T3x", "3x").spot("T3-Tx", "Tx").absorb("T3x").viva();
              S.mount("T3", "3").spot("T3-T1", "T1").absorb("T3").viva();
            },
          },
        ],
      };
      const YYYroutineOne = {
        title: "Quadratic Mania",
        intro: "make root if you can",
        stage: `
          <b id="T1">
            <b data-frak>
              <b data-numerator>3x + 3</b>
              <b data-denominator>3</b>
            </b>
          </b>
          <b id="T+2">
           <b id="T+">+ </b>
           <b id="Tx2">x<b data-sup><b id="T2">2</b></b></b>
          </b>
          <b id="T3">+ 3</b>
          <b id="T4">+ 4</b>
        `,
        steps: [
          {
            note: " how are you ? ",
            acts: (S) => {
              S.spot("T1").viva();
              // S.spot("T100").spin();
            },
          },
          {
            note: " root each side ",
            acts: (S) => {
              S.mount("T3-a", "3").mount("T3-b", "3");
              S.spot("T2").frak("T3-a");
              S.spot("T4").frak("T3-b");
            },
          },
          {
            note: "what is left of this?",
            acts: (S) => {
              S.spot("Tx2").cirk("2");
              S.mount("Tploos", "+").insertBefore("T1").grow();
              S.spot("T4-frak").root("T-RAT");
              S.spot("T-RAT").tuck().moveBefore("Tploos");
            },
          },
        ],
      };
      const routineOne = {
        title: "Root Root Root For The Home Team",
        intro: "you are asked to solve this for x",
        stage: `
          <b id="T1">1</b>
          <b id="Tploos">+</b>
          <b id="T2x2">
            2<b id="Tx2-A">x^2</b>
          </b>
          <b id="T+x2">
            + <b id="Tx2-B">x^2</b> 
          </b>
          <b id="EQ">=</b>
          <b id="T4">4</b>
        `,
        steps: [
          {
            note: `
              notice the like-terms
              <b>
                "like terms" refers to when terms each have the
                same variable with same exponent - in this
                instance, 2x^2 and x^2 both have x^2 in common
              </b>
            `,
            acts: (S) => {
              S.spot("T2x2", "Tx2-B").viva();
            },
          },
          {
            note: "they have a common variable and exponent",
            acts: (S) => {
              S.spot("Tx2-A").cirk("2").during(0, 0.3);
              S.spot("Tx2-B").cirk("2").during(0.45, 1);
            },
          },
          {
            note: "group those together",
            acts: (S) => {
              S.mount("P1", "(").insertBefore("T2x2").grow().viva();
              S.mount("P2", ")").insertBefore("EQ").grow().viva();
            },
          },
          {
            note: `
              combine those into one term
              <b>
                you can add the coeffcients - those are the
                numbers in front of the variabel - in this
                case, two and the implied one combine to make
                3x^2
              </b> 
            `,
            acts: (S) => {
              S.mount("T3x2", "3x^2");
              S.spot("T2x2", "T+x2").absorb("T3x2");
            },
          },
          {
            note: "we can drop the ()'s now",
            acts: (S) => {
              S.spot("P1", "P2").vaporize().shrink().during(0.5);
            },
          },
          {
            note: `
              flip that 1 to the other side
              <b>
                terms can move to the other side of an equals
                sign if you flip their sign; in this case,
                positive one on the left hand side becomes
                negative one on the right hand side
            `,
            acts: (S) => {
              S.spot("P1", "P2").dismount();
              S.spot("Tploos").vaporize().shrink().during(0, 0.4);
              S.mount("T-new", "-").grow().insertAfter("T4");
              S.spot("T1").spin("720deg").vault().moveAfter("T-new");
            },
          },
          {
            note: "that subtraction is fairly simple",
            acts: (S) => {
              S.spot("Tploos").dismount();
              S.mount("T3", "3");
              S.spot("T4", "T-new", "T1").absorb("T3");
            },
          },
          {
            note: "divide both sides by three",
            acts: (S) => {
              S.mount("D3-A", "3").mount("D3-B", "3");
              S.spot("T3x2").frak("D3-A");
              S.spot("T3").frak("D3-B");
            },
          },
          {
            note: "three divided by three is one",
            acts: (S) => {
              S.mount("T1", "1").insertAfter("T3-frak").grow();
              S.spot("T3-frak").vaporize().shrink();
            },
          },
          {
            note: "hmmm",
            acts: (S) => {
              S.spot("T1").color("189");
              S.spot("T3-frak").dismount();
            },
          },
        ],
      };
      const routineTwo = {
        title: "Quadratic Mania",
        intro: "you must solve this equation for x",
        stage: `
          <b id="T3x2">3x^g_2</b>
          <b id="T7x2">+ 7x^g_2</b>
          <b id="T2">+ 2</b>
          <b id="EQ">=</b>
          <b id="T10">10</b>
        `,
        steps: [
          {
            note: `notice the like terms
              <b>
                like terms refers to the variable and its
                exponent being the same - in this case,
                there is the same variable x with
                an exponent of g_2 on two different terms;
                you can combine them by adding the
                coefficients, three and seven
              </b>
            `,
            acts: (S) => {
              S.mount("P1", "(").insertBefore("T3x2");
              S.mount("P2", ")").insertAfter("T7x2");
              S.spot("P1", "P2").grow().during(0, 0.5);
              S.spot("T3x2", "T7x2").viva();
              S.spot("T10").vaporize().shrink().spin("180deg").during(0, 0.3);
              S.spot("T2").grow();
            },
          },
          {
            note: "absorb them",
            acts: (S) => {
              S.spot("P1", "P2").ghost().during(0.4).shrink().during(0.5);
              S.mount("T10x2", "10x^g_2");
              S.spot("T3x2", "T7x2").absorb("T10x2").viva();
              S.spot("T10").viva().cank();
            },
          },
          {
            note: "what about this?",
            acts: (S) => {
              S.spot("P1", "P2").dismount();
              S.spot("T10x2").vaporize().shrink().during(0.7);
              S.spot("T2").filter("ghost").filterClear();
            },
          },
          {
            note: "does +2 have the ghost from before?",
            acts: (S) => {
              S.spot("T10x2").dismount();
              S.spot("T2").filter("");
              S.spot("T10").filter("viva");
            },
          },
          {
            note: "a new floor",
            load: `
              <b id="T3x2">3x^2</b>
              <b id="T4x">+ 4x</b>
              <b id="T1">+ 1</b>
              <b id="EQ">=</b>
              <b id="T0">0</b>
            `,
            acts: (S) => {
              S.spot("T3x2", "T4x", "T1", "EQ", "T0").unfurl();
              S.spot("T0").spin().during(0.9);
              S.spot("T3x2").filter("viva").filterClear().during(0.7);
            },
          },
        ],
      };
    </script>
    <script id="LIZZERS">
      const log = console.log;
      const one = document.getElementById("one");
      const two = document.getElementById("two");
      one.addEventListener("mbx-ready", (e) => {
        one.loadRoutine(routineOne);
      });
      two.addEventListener("mbx-ready", (e) => {
        two.loadRoutine(routineTwo);
      });
      one.addEventListener("mbx-step-ready", (e) => {
        // console.log(e.detail, "ready");
      });
    </script>
  </body>
</html>
